<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Schaeffler Catalogue</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; overflow: hidden; }
header { background: #0F172A; color: #fff; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #BE000F; flex-shrink: 0; }
h1 { font-size: 16px; font-weight: 700; }
.search { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; padding: 6px 10px; color: #fff; font-size: 12px; width: 100px; }
.search::placeholder { color: rgba(255,255,255,0.5); }
.search:focus { outline: none; width: 140px; border-color: #BE000F; }
.menu { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; display: none; padding: 4px; }
.container { display: flex; flex: 1; overflow: hidden; }
.sidebar { background: #0F172A; width: 240px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
.sidebar.hide { display: none; }
.item { padding: 10px 14px; color: rgba(255,255,255,0.7); cursor: pointer; border-left: 3px solid transparent; font-size: 12px; font-weight: 500; }
.item:hover { background: rgba(255,255,255,0.08); }
.item.active { background: rgba(190,0,15,0.15); color: #BE000F; border-left-color: #BE000F; }
.content { flex: 1; overflow-y: auto; padding: 14px; }
.title { font-size: 16px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #BE000F; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; }
.card:hover { box-shadow: 0 2px 8px rgba(190,0,15,0.12); border-color: #BE000F; }
.card-name { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
.card-spec { font-size: 11px; color: #666; line-height: 1.4; margin-bottom: 8px; }
.btn { width: 100%; padding: 8px; background: #BE000F; color: #fff; border: none; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
.btn:active { background: #9a000c; }
footer { padding: 8px 12px; font-size: 10px; color: #666; text-align: center; border-top: 1px solid #e0e0e0; flex-shrink: 0; }
@media (max-width: 768px) { .menu { display: block; } .grid { grid-template-columns: 1fr; } .sidebar.hide { display: none; } }
</style>
</head>
<body>
<header>
  <h1>Schaeffler Catalogue</h1>
  <input class="search" id="search" placeholder="Search...">
  <button class="menu" id="menu">☰</button>
</header>

<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="title" id="title">Loading...</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<footer>GodavariTech | Schaeffler India | Offline-Ready</footer>

<script>
console.log('%cSchaeffler Catalogue Starting', 'color: #BE000F; font-size: 14px; font-weight: bold;');

const FAMILIES = {
  'rolling': { title: 'Rolling Bearings FAG/INA', products: [
    { name: 'Deep Groove Ball', spec: 'FAG 60xx/62xx/63xx', cat: 'High-speed, low-friction' },
    { name: 'Angular Contact', spec: '35° contact angle', cat: 'Radial & axial loads' },
    { name: 'Four-Point Contact', spec: 'QJ X-life, split ring', cat: 'Compressors, pumps, automotive' },
    { name: 'Self-Aligning Ball', spec: 'INA 120xx/130xx', cat: 'Misalignment compensation' },
    { name: 'Thin-Section', spec: 'Compact design', cat: 'Space-constrained applications' },
    { name: 'Cylindrical Roller', spec: 'NJ/NU series', cat: 'High radial load machinery' }
  ]},
  'cam-followers': { title: 'INA Cam Followers & Track Rollers', products: [
    { name: 'KR Series', spec: 'Stud/yoke variants', cat: 'High-speed, low-friction' },
    { name: 'NUTR Track Rollers', spec: 'Needle roller system', cat: 'Linear motion automation' },
    { name: 'NART Series', spec: 'Heavy-duty guidance', cat: 'Precision positioning' }
  ]},
  'arcanol': { title: 'Arcanol Rolling Bearing Greases', products: [
    { name: 'ARCANOL MULTI2', spec: '400g, 1kg, 5kg, 25kg', cat: 'Multi-purpose, wide range' },
    { name: 'ARCANOL LOAD', spec: 'Heavy-duty formula', cat: 'High-load extended life' },
    { name: 'ARCANOL TEMP', spec: 'High-temperature', cat: 'Up to 150°C continuous' },
    { name: 'Refill Cartridge', spec: 'CONCEPT-compatible', cat: '100% quality tested' }
  ]},
  'heaters': { title: 'FAG Induction Heaters', products: [
    { name: 'MFT Mobile', spec: 'Medium-frequency', cat: '60% cost savings, on-site' },
    { name: 'HEATER Table', spec: 'Touchscreen control', cat: '50% time & energy savings' },
    { name: 'HEATER Floor', spec: 'Heavy-duty industrial', cat: 'Large components, safety' }
  ]},
  'concept': { title: 'CONCEPT Automatic Lubricators', products: [
    { name: 'CONCEPT 1', spec: 'Compact', cat: 'Single-point application' },
    { name: 'CONCEPT 2', spec: 'Digital display', cat: 'Flexible scheduling' },
    { name: 'CONCEPT 4', spec: '4-outlet', cat: 'Coordinated timing' },
    { name: 'CONCEPT 8', spec: 'Industrial scale', cat: 'Up to 8 points' }
  ]},
  'optime': { title: 'OPTIME Condition Monitoring', products: [
    { name: 'SmartCheck Sensor', spec: 'ISO 18436 certified', cat: 'Vibration monitoring' },
    { name: 'ProLink Gateway', spec: '3-module hub', cat: 'Cloud integration' },
    { name: 'Premesy Controller', spec: '4-channel monitor', cat: 'Local processing' },
    { name: 'OPTIME Smart Lube', spec: 'Integrated sensor', cat: 'Predictive greasing' }
  ]},
  'cbm': { title: 'Portable CBM', products: [
    { name: 'Portable CBM Unit', spec: 'Handheld analyzer', cat: 'Field diagnostics' },
    { name: 'Vibration Sensor Kit', spec: 'Multi-mount options', cat: 'Wireless/wired' }
  ]},
  'alignment': { title: 'LASER-EQUILIGN Alignment', products: [
    { name: 'EQUILIGN Compact', spec: 'Portable', cat: 'Fast alignment' },
    { name: 'EQUILIGN Industrial', spec: 'High-precision', cat: 'Large equipment' }
  ]},
  'mounting': { title: 'Mounting & Dismounting Tools', products: [
    { name: 'Hydraulic Puller', spec: 'Multiple sizes', cat: 'Safe removal' },
    { name: 'Mounting Sleeve', spec: 'Standard/custom', cat: 'Uniform pressure' },
    { name: 'Installation Kit', spec: 'Complete toolset', cat: 'Guides, adapters' }
  ]},
  'linear': { title: 'Linear Motion Systems', products: [
    { name: 'Recirculating Ball', spec: 'KWVE-W series', cat: 'Smooth linear motion' },
    { name: 'Ball Monorail', spec: 'Double-rail precision', cat: 'High accuracy automation' },
    { name: 'Roller Monorail', spec: 'Heavy-load systems', cat: 'Large equipment' }
  ]},
  'spindle': { title: 'M-Series Spindle Bearings', products: [
    { name: 'M-Series (100Cr6)', spec: 'Cost-effective', cat: 'Milling, turning, grinding' },
    { name: 'HCM-Series', spec: 'Ceramic balls', cat: 'High-speed performance' },
    { name: 'VCM-Series', spec: 'Vacrodur rings', cat: 'Extreme robustness' }
  ]}
};

let current = 'rolling';
const sidebar = document.getElementById('sidebar');
const grid = document.getElementById('grid');
const title = document.getElementById('title');
const search = document.getElementById('search');
const menu = document.getElementById('menu');

console.log('%cData loaded: ' + Object.keys(FAMILIES).length + ' families', 'color: #0F172A');

function renderSidebar() {
  console.log('Rendering sidebar...');
  Object.keys(FAMILIES).forEach(key => {
    const item = document.createElement('div');
    item.className = 'item' + (key === 'rolling' ? ' active' : '');
    item.textContent = FAMILIES[key].title;
    item.onclick = function() { selectFamily(key); };
    sidebar.appendChild(item);
  });
  console.log('%cSidebar rendered', 'color: green');
}

function selectFamily(key) {
  console.log('Selected family:', key);
  current = key;
  const family = FAMILIES[key];
  
  title.textContent = family.title;
  
  document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  
  renderProducts(family.products);
  search.value = '';
  if (window.innerWidth <= 768) sidebar.classList.add('hide');
}

function renderProducts(products) {
  console.log('Rendering ' + products.length + ' products');
  
  if (!products || products.length === 0) {
    grid.innerHTML = '<div style="padding:20px; color:#666;">No products found</div>';
    return;
  }

  let html = '';
  for (let i = 0; i < products.length; i++) {
    const p = products[i];
    html += '<div class="card"><div class="card-name">' + p.name + '</div><div class="card-spec">' + p.spec + '<br>' + p.cat + '</div><button class="btn">View Specs</button></div>';
  }
  
  grid.innerHTML = html;
  console.log('%c' + products.length + ' products rendered', 'color: green');
}

search.addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase();
  const family = FAMILIES[current];
  
  if (!q) {
    renderProducts(family.products);
    return;
  }

  const filtered = [];
  for (let i = 0; i < family.products.length; i++) {
    const p = family.products[i];
    if (p.name.toLowerCase().includes(q) || p.spec.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)) {
      filtered.push(p);
    }
  }
  
  renderProducts(filtered);
});

menu.addEventListener('click', function() {
  sidebar.classList.toggle('hide');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.sidebar') && e.target !== menu) {
    if (window.innerWidth <= 768) sidebar.classList.add('hide');
  }
});

console.log('%cInitializing app...', 'color: #BE000F; font-weight: bold');
renderSidebar();
selectFamily('rolling');
console.log('%c✓ App Ready', 'color: green; font-size: 14px; font-weight: bold');
</script>
</body>
</html>
